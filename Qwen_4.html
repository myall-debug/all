<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <script>
  var password = prompt("生日那天？");
  if (password !== "1217") {
    alert("口令错误！");
    window.location.href = "https://google.com"; // 输错就跳到百度
  }
</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品描述编辑器 - 增强版</title>
<style>
/* ===== 核心样式：为编辑器添加独立容器前缀，隔离所有样式作用域 ===== */
.product-editor *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
.product-editor body{background:#f4f7fa;padding:20px;padding-left:220px;}

/* ===== 左侧浮动窗口样式 ===== */
.product-editor .float-sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 200px; background: #fff;
  border-right: 1px solid #e5e7eb; box-shadow: 2px 0 8px rgba(0,0,0,.06);
  z-index: 9999; overflow-y: auto; transition: all 0.3s ease;
}
.product-editor .float-sidebar.collapsed { width: 50px; }
.product-editor .sidebar-header { padding: 12px 10px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
.product-editor .sidebar-header h5 { font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-editor .sidebar-toggle { background: transparent; border: none; cursor: pointer; font-size: 16px; color: #666; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
.product-editor .module-list { padding: 8px; }
.product-editor .module-item { padding: 8px 6px; margin-bottom: 6px; background: #f9f9f9; border-radius: 6px; border: 1px solid #eee; cursor: grab; }
.product-editor .module-item:hover { background: #f0f7ff; border-color: #3161e7; }
.product-editor .module-item-title { font-size: 12px; color: #333; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-editor .module-item-actions { display: flex; gap: 4px; justify-content: flex-end; }
.product-editor .module-item-btn { padding: 2px 6px; font-size: 10px; border: 1px solid #ddd; border-radius: 3px; background: #fff; cursor: pointer; color: #666; }
.product-editor .module-item-btn.up { color: #3161e7; border-color: #3161e7; }
.product-editor .module-item-btn.down { color: #2ecc71; border-color: #2ecc71; }
.product-editor .module-item-btn.del { color: #e74c3c; border-color: #e74c3c; }

/* ===== 主区域布局 ===== */
.product-editor .main{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.product-editor .panel{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.product-editor .preview{min-height:90vh;overflow-y:auto}

/* ===== 模块通用样式 ===== */
.product-editor .module{border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-bottom:16px;transition:all 0.2s}
.product-editor .module.hidden{opacity:0.5;border-style:dashed}
.product-editor .module-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.product-editor .module-header h4{font-size:14px;color:#222}
.product-editor .module-tools{display:flex;gap:6px;flex-wrap:wrap}
.product-editor .module-tools button{padding:3px 6px;font-size:12px;border:1px solid #ddd;border-radius:4px;background:#f9f9f9;cursor:pointer}
.product-editor .module-tools .del{background:#fee;color:#e74c3c;border-color:#fcc}
.product-editor .module-tools .hide{background:#fcf;color:#9b59b6;border-color:#fcc}

.product-editor .form-group{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.product-editor .form-group label{min-width:70px;font-size:13px;color:#555}
.product-editor .form-group input,.product-editor .form-group textarea,.product-editor .form-group select{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:4px}
.product-editor .form-group textarea{min-height:70px;resize:vertical}

.product-editor .table-row{display:flex;gap:6px;margin-bottom:8px;align-items:flex-start}
.product-editor .table-cell{flex:1;border:1px solid #eee;border-radius:4px;padding:6px;min-width:100px}
.product-editor .table-cell select,.product-editor .table-cell input{width:100%;margin-bottom:4px;font-size:12px}
.product-editor .row-tool{display:flex;gap:6px;margin-bottom:8px}
.product-editor .row-tool button{padding:4px 8px;font-size:12px;border:1px solid #ddd;border-radius:4px;background:#f8f8f8;cursor:pointer}

.product-editor .add-module-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;padding:10px;background:#f9f9f9;border-radius:8px}
.product-editor .add-module-btn{padding:6px 12px;font-size:13px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer}
.product-editor .add-module-btn:hover{background:#f0f7ff;border-color:#3161e7;color:#3161e7}

.product-editor .template-bar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.product-editor .template-bar input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;min-width:180px}
.product-editor .template-bar select{padding:6px 10px;border:1px solid #ddd;border-radius:6px;min-width:180px}
.product-editor .template-bar button{padding:6px 12px;border-radius:6px;border:none;background:#3161e7;color:white;cursor:pointer}
.product-editor .template-bar .del-tpl{background:#e74c3c}
.product-editor .template-bar .backup-btn{background:#2ecc71}
.product-editor .template-bar .restore-btn{background:#f39c12}

.product-editor .btn-group{display:flex;gap:10px;margin-top:20px}
.product-editor .btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:14px}
.product-editor .btn.primary{background:#3161e7;color:#fff}
.product-editor .btn.secondary{background:#f1f3f6;color:#333}
.product-editor .btn.danger{background:#e74c3c;color:#fff}
.product-editor .btn.paste{background:#9b59b6;color:#fff}

/* ===== 预览区样式 ===== */
.product-editor #preview-html{line-height:1.6}
.product-editor #preview-html table{width:100%;border-collapse:collapse;margin:14px 0;border:1px solid #ddd}
.product-editor #preview-html td{border:1px solid #ddd;padding:10px;vertical-align:middle}
.product-editor #preview-html img{max-width:100%;height:auto}
.product-editor #preview-html .module-title-wrap{margin:8px 0;font-weight:bold}

/* 视频模块预览 */
.product-editor #preview-html .video-container { position: relative; width: 100%; padding-bottom: 56.25%; margin: 10px 0; background: #f5f5f5; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
.product-editor #preview-html .video-container iframe, .product-editor #preview-html .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
.product-editor #preview-html .video-fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: #f8f8f8; color: #666; padding: 20px; text-align: center; }
.product-editor #preview-html .video-fallback.active { display: flex; }
.product-editor #preview-html .video-fallback-icon { font-size: 48px; margin-bottom: 16px; color: #999; }
.product-editor #preview-html .video-fallback-link { margin-top: 12px; padding: 8px 16px; background: #3161e7; color: #fff !important; border-radius: 6px; text-decoration: none; border-bottom: none !important; }

/* 下载模块预览 */
.product-editor .download-card { display: flex !important; align-items: center !important; gap: 12px !important; background: #f8f9fa !important; border-radius: 10px !important; padding: 16px 20px !important; margin: 10px 0 !important; border: 1px solid #e9ecef !important; transition: all 0.2s ease !important; width: 100% !important; box-sizing: border-box !important; text-decoration: none !important; border-bottom: none !important; box-shadow: none !important; color: inherit !important; cursor: default !important; }
.product-editor .download-card:hover { background: #f0f7ff !important; border-color: #3161e7 !important; transform: translateY(-2px) !important; box-shadow: 0 4px 12px rgba(49, 97, 231, 0.1) !important; }
.product-editor .download-icon { width: 48px !important; height: 48px !important; border-radius: 8px !important; display: flex !important; align-items: center !important; justify-content: center !important; font-size: 24px !important; color: #fff !important; flex-shrink: 0 !important; }
.product-editor .icon-pdf { background: #e74c3c !important; } .product-editor .icon-doc { background: #3498db !important; } .product-editor .icon-xls { background: #2ecc71 !important; } .product-editor .icon-ppt { background: #f39c12 !important; } .product-editor .icon-zip { background: #9b59b6 !important; } .product-editor .icon-txt { background: #34495e !important; }
.product-editor .download-icon img { width: 24px !important; height: 24px !important; object-fit: contain !important; filter: brightness(0) invert(1) !important; }
.product-editor .download-info { flex: 1 !important; }
.product-editor .download-title { font-size: 16px !important; font-weight: 600 !important; color: #2d3748 !important; margin-bottom: 4px !important; }
.product-editor .download-desc { font-size: 14px !important; color: #718096 !important; }
.product-editor .download-btn { padding: 8px 16px !important; background: #3161e7 !important; color: #fff !important; border: none !important; border-radius: 6px !important; font-size: 14px !important; cursor: pointer !important; white-space: nowrap !important; flex-shrink: 0 !important; text-decoration: none !important; border-bottom: none !important; display: inline-block !important; }
.product-editor .download-btn:hover { background: #254fcb !important; }

/* ===== 高亮提示框预览（新增3种样式） ===== */
.product-editor .alert-box { border-radius: 4px; padding: 12px 16px; position: relative; margin-bottom: 16px; font-size: 14px; line-height: 1.5; }
.product-editor .alert-warning { background-color: #fffbe6; border-left: 4px solid #faad14; }
.product-editor .alert-success { background-color: #f0fff4; border-left: 4px solid #52c41a; }
.product-editor .alert-error { background-color: #fff2f0; border-left: 4px solid #f5222d; border-radius: 8px 0 0 8px; }
.product-editor .alert-info { background-color: #e6f7ff; border-left: 4px solid #1890ff; }
/* 新增：紫色创意 */
.product-editor .alert-purple { background-color: #f5f3ff; border-left: 4px solid #8b5cf6; }
.product-editor .alert-purple .alert-title { color: #7c3aed; }
/* 新增：橙色特惠 */
.product-editor .alert-orange { background-color: #fff7ed; border-left: 4px solid #f97316; }
.product-editor .alert-orange .alert-title { color: #ea580c; }
/* 新增：黑色高级 */
.product-editor .alert-black { background-color: #f3f4f6; border-left: 4px solid #111111; }
.product-editor .alert-black .alert-title { color: #111111; }
.product-editor .alert-black .alert-content { color: #374151; }

.product-editor .alert-title { font-weight: bold; margin-bottom: 6px; display: flex; align-items: center; font-size: 14px; }
.product-editor .alert-error .alert-title { color: #f5222d; } .product-editor .alert-warning .alert-title { color: #faad14; } .product-editor .alert-success .alert-title { color: #52c41a; } .product-editor .alert-info .alert-title { color: #1890ff; }
.product-editor .alert-icon { margin-right: 8px; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
.product-editor .alert-content { color: #333; font-size: 14px; line-height: 1.5; }

/* 卖点卡片预览 */
.product-editor .selling-points { display: flex; flex-wrap: wrap; gap: 12px; margin: 10px 0; }
.product-editor .point-card { flex: 1; min-width: 200px; padding: 16px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
.product-editor .point-card:hover { background: #f0f7ff; border-color: #3161e7; transform: translateY(-2px); }
.product-editor .point-icon { font-size: 24px; flex-shrink: 0; } .product-editor .point-icon img { width: 24px; height: 24px; object-fit: contain; }
.product-editor .point-text { font-size: 14px; color: #333; font-weight: 500; }

/* 折叠面板预览 */
.product-editor .collapse-panel { border: 1px solid #e5e7eb; border-radius: 8px; margin: 10px 0; overflow: hidden; }
.product-editor .collapse-item { border-bottom: 1px solid #e5e7eb; } .product-editor .collapse-item:last-child { border-bottom: none; }
.product-editor .collapse-header { padding: 12px 16px; background: #f9fafb; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; font-size: 14px; }
.product-editor .collapse-header:hover { background: #f3f4f6; } .product-editor .collapse-header::after { content: "▼"; font-size: 10px; color: #666; transition: transform 0.2s; }
.product-editor .collapse-header.active::after { transform: rotate(180deg); }
.product-editor .collapse-content { padding: 16px; font-size: 14px; line-height: 1.6; color: #4b5563; display: block; }

.product-editor .point-tool, .product-editor .collapse-tool { display: flex; justify-content: flex-end; margin-bottom: 8px; }
.product-editor .del-point-btn, .product-editor .del-collapse-btn { padding: 4px 8px; font-size: 12px; border: 1px solid #e74c3c; border-radius: 4px; background: #fee; color: #e74c3c; cursor: pointer; }
.product-editor .del-point-btn:hover, .product-editor .del-collapse-btn:hover { background: #fcc; }

/* 弹窗样式 */
.product-editor .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:999}
.product-editor .modal-body{background:#fff;width:90%;max-width:900px;padding:20px;border-radius:10px;max-height:80vh;overflow-y:auto}
.product-editor .modal-content{display:block}
.product-editor .modal-body textarea{width:100%;min-height:200px;padding:10px;font-family:consolas,monospace;font-size:12px}
.product-editor #templateFileInput{display:none}

/* ===== 新增功能样式：折叠、置顶、复制按钮 ===== */
.product-editor .module.collapsed > *:not(.module-header) { display: none !important; }
.product-editor .module.collapsed .module-header { background: #f8fafc; border-bottom: 2px dashed #cbd5e1; }
.product-editor .module-tools .top { background: #e6f7ff; color: #1890ff; border-color: #91d5ff; }
.product-editor .module-tools .copy-mod { background: #f6ffed; color: #52c41a; border-color: #b7eb8f; }
.product-editor .module-tools .collapse-editor { background: #fff7e6; color: #fa8c16; border-color: #ffd591; min-width: 60px; }
.product-editor .module.collapsed .collapse-editor::after { content: " 展开"; }
.product-editor .module:not(.collapsed) .collapse-editor::after { content: " 折叠"; }

/* ===== 新增模块样式：排版工具 & 自由代码 ===== */
.product-editor .format-fields { display: none; background: #f9fafb; padding: 10px; border-radius: 6px; margin-top: 8px; border: 1px solid #eee; }
.product-editor .customcode-wrap { background: #f8f9fa; padding: 10px; border-radius: 6px; margin-top: 8px; border: 1px solid #eee; }
.product-editor .customcode-preview { background: #fff; padding: 8px; border-radius: 4px; border: 1px dashed #ccc; margin-top: 8px; min-height: 40px; font-size: 13px; color: #666; }
.product-editor .customcode-preview code { font-family: monospace; white-space: pre-wrap; word-break: break-all; }
.product-editor .preview-toggle { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 12px; color: #666; }
.product-editor .preview-toggle input { margin: 0; }

/* ===== 移动端适配 ===== */
@media(max-width:768px){
  .product-editor body{padding-left:50px;}
  .product-editor .float-sidebar { width: 50px; } .product-editor .float-sidebar.expanded { width: 200px; }
  .product-editor .sidebar-header h5 { display: none; } .product-editor .float-sidebar.expanded .sidebar-header h5 { display: block; }
  .product-editor .main{grid-template-columns:1fr} .product-editor .table-row{flex-direction:column}
  .product-editor .template-bar{flex-direction:column;align-items:stretch}
  .product-editor .template-bar input,.product-editor .template-bar select{width:100%;margin-bottom:8px}
  .product-editor .download-card { flex-direction: column !important; text-align: center !important; } .product-editor .download-info { width: 100% !important; }
  .product-editor .selling-points { flex-direction: column; } .product-editor .point-card { min-width: 100%; }
}
</style>
</head>
<body>
<div class="product-editor">
<!-- ===== 左侧浮动窗口 ===== -->
<div class="float-sidebar" id="floatSidebar">
  <div class="sidebar-header"><h5>模块快速操作</h5><button class="sidebar-toggle" id="sidebarToggle">≡</button></div>
  <div class="module-list" id="moduleList"></div>
</div>

<!-- ===== 主编辑区域 ===== -->
<div class="main">
  <div class="panel">
    <h3>商品描述编辑工具（增强版）</h3>
    
    <!-- 模板工具栏 -->
    <div class="template-bar">
      <input type="text" id="tplName" placeholder="输入模板名称，例如：筒灯详情标准模板">
      <button id="saveTemplate">💾 保存当前为模板</button>
      <select id="templateList"><option value="">—— 选择加载模板 ——</option></select>
      <button id="loadTemplate">📄 加载选中模板</button>
      <button id="delTemplate" class="del-tpl">🗑️ 删除该模板</button>
      <button id="exportTemplateBtn" class="backup-btn">📤 导出模板</button>
      <button id="importTemplateBtn" class="restore-btn">📥 导入模板</button>
      <input type="file" id="templateFileInput" accept=".json">
    </div>

    <!-- 添加模块按钮组 -->
    <div class="add-module-group">
      <button class="add-module-btn" data-type="title">➕ 标题</button>
      <button class="add-module-btn" data-type="table">➕ 表格</button>
      <button class="add-module-btn" data-type="text">➕ 文本</button>
      <button class="add-module-btn" data-type="image">➕ 图片</button>
      <button class="add-module-btn" data-type="video">➕ 视频</button>
      <button class="add-module-btn" data-type="download">➕ 下载</button>
      <button class="add-module-btn" data-type="alert">➕ 高亮提示框</button>
      <button class="add-module-btn" data-type="selling">➕ 卖点卡片</button>
      <button class="add-module-btn" data-type="collapse">➕ 折叠面板</button>
      <!-- 新增按钮 -->
      <button class="add-module-btn" data-type="format">➕ 排版工具</button>
      <button class="add-module-btn" data-type="customcode">➕ 自由代码</button>
    </div>

    <!-- 一键操作栏 -->
    <div style="margin:12px 0;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn danger" id="clearAll">🗑️ 一键清空所有模块</button>
      <button class="btn primary" id="copyConfig">📋 复制当前全部配置</button>
      <button class="btn paste" id="pasteConfig">📥 粘贴配置并恢复</button>
    </div>

    <!-- ===== 模块容器（包含所有初始模块） ===== -->
    <div id="modules-container">
      
      <!-- 1. 初始标题模块 -->
      <div class="module" data-type="title" data-id="t1">
        <div class="module-header"><h4>标题模块</h4><div class="module-tools"><button class="top">置顶</button><button class="up">上移</button><button class="down">下移</button><button class="copy-mod">复制</button><button class="collapse-editor"></button><button class="hide">隐藏</button><button class="del">删除</button></div></div>
        <div class="form-group"><label>标题内容</label><input type="text" class="title-text" value="产品核心卖点"></div>
        <div class="form-group"><label>标题级别</label><select class="title-level"><option value="h2">H2</option><option value="h1">H1</option><option value="h3">H3</option></select></div>
        <div class="form-group"><label>标题字号</label><select class="title-size"><option value="16px">16px (大)</option><option value="14px" selected>14px (中)</option><option value="12px">12px (小)</option></select></div>
      </div>

      <!-- 2. 初始文本模块 -->
      <div class="module" data-type="text" data-id="x1">
        <div class="module-header"><h4>文本描述</h4><div class="module-tools"><button class="top">置顶</button><button class="up">上移</button><button class="down">下移</button><button class="copy-mod">复制</button><button class="collapse-editor"></button><button class="hide">隐藏</button><button class="del">删除</button></div></div>
        <div class="form-group"><label>模块标题</label><input type="text" class="module-title" placeholder="选填：模块标题"></div>
        <div class="form-group"><label>标题字号</label><select class="title-size"><option value="16px">16px (大)</option><option value="14px" selected>14px (中)</option><option value="12px">12px (小)</option></select></div>
        <div class="form-group"><label>描述内容</label><textarea class="text-content">产品采用优质材质。</textarea></div>
        <div class="form-group"><label>字体大小</label><select class="text-size"><option value="14px">14px</option><option value="12px">12px</option><option value="16px">16px</option></select></div>
      </div>

      <!-- 3. 初始表格模块 -->
      <div class="module" data-type="table" data-id="b1">
        <div class="module-header"><h4>自由表格</h4><div class="module-tools"><button class="top">置顶</button><button class="up">上移</button><button class="down">下移</button><button class="copy-mod">复制</button><button class="collapse-editor"></button><button class="hide">隐藏</button><button class="del">删除</button></div></div>
        <div class="form-group"><label>模块标题</label><input type="text" class="module-title" placeholder="选填：模块标题" value="产品参数"></div>
        <div class="form-group"><label>标题字号</label><select class="title-size"><option value="16px">16px (大)</option><option value="14px" selected>14px (中)</option><option value="12px">12px (小)</option></select></div>
        <div class="table-container">
          <div class="table-row-item">
            <div class="row-tool"><button class="add-col">本行加列</button><button class="del-col">本行删列</button><button class="del-row">删除本行</button></div>

<script>
let renderTimer = null;

// ===== 新增功能辅助函数 =====
// 排版模块字段显隐控制
function toggleFormatFields(select) {
  const type = select.value;
  const module = select.closest('.module');
  if (!module) return;
  module.querySelectorAll('.format-fields').forEach(el => el.style.display = 'none');
  const target = module.querySelector(`.format-fields[data-type="${type}"]`);
  if (target) target.style.display = 'block';
}

// ===== 侧边栏与模块管理 =====
function getModuleShortTitle(moduleEl) {
  const type = moduleEl.dataset.type;
  let title = '';
  switch(type) {
    case 'title': title = moduleEl.querySelector('.title-text')?.value || '未命名标题'; break;
    case 'text': title = moduleEl.querySelector('.module-title')?.value || moduleEl.querySelector('.text-content')?.value.substring(0, 10) || '未命名文本'; break;
    case 'table': title = moduleEl.querySelector('.module-title')?.value || '未命名表格'; break;
    case 'image': title = moduleEl.querySelector('.module-title')?.value || moduleEl.querySelector('.img-desc')?.value || '未命名图片'; break;
    case 'video': title = moduleEl.querySelector('.module-title')?.value || moduleEl.querySelector('.video-desc')?.value || '未命名视频'; break;
    case 'download': title = moduleEl.querySelector('.module-title')?.value || moduleEl.querySelector('.file-name')?.value || '未命名下载'; break;
    case 'alert': title = moduleEl.querySelector('.alert-title-text')?.value || moduleEl.querySelector('.alert-content')?.value.substring(0, 10) || '未命名提示框'; break;
    case 'selling': title = moduleEl.querySelector('.module-title')?.value || '未命名卖点卡片'; break;
    case 'collapse': title = moduleEl.querySelector('.module-title')?.value || '未命名折叠面板'; break;
    case 'format': const ft = moduleEl.querySelector('.format-type')?.value || 'divider'; const map = {divider:'分割线',spacer:'空白间距',list:'项目列表',center:'居中文本'}; title = map[ft] || '排版工具'; break;
    case 'customcode': title = '自由代码'; break;
    default: title = '未命名模块';
  }
  const typeNameMap = {'title':'标题','text':'文本','table':'表格','image':'图片','video':'视频','download':'下载','alert':'高亮提示框','selling':'卖点卡片','collapse':'折叠面板','format':'排版工具','customcode':'自由代码'};
  const shortTitle = title.length > 15 ? title.substring(0, 15) + '...' : title;
  return `${typeNameMap[type] || '模块'}：${shortTitle}`;
}

function refreshSidebarModuleList() {
  try {
    const moduleListEl = document.getElementById('moduleList');
    const modules = document.querySelectorAll('.module');
    let html = '';
    modules.forEach((mod, index) => {
      const modId = mod.dataset.id || `mod_${Date.now()}_${index}`;
      mod.dataset.id = modId;
      const shortTitle = getModuleShortTitle(mod);
      html += `<div class="module-item" data-mod-id="${modId}"><div class="module-item-title">${shortTitle}</div><div class="module-item-actions"><button class="module-item-btn up" data-mod-id="${modId}">↑</button><button class="module-item-btn down" data-mod-id="${modId}">↓</button><button class="module-item-btn del" data-mod-id="${modId}">×</button></div></div>`;
    });
    moduleListEl.innerHTML = html;
    initDragSort();
  } catch (error) { console.error('刷新侧边栏模块列表失败:', error); }
}

function toggleSidebar() {
  const sidebar = document.getElementById('floatSidebar');
  sidebar.classList.toggle('collapsed');
  sidebar.classList.toggle('expanded');
}

function handleSidebarModuleAction(e) {
  const target = e.target;
  const modId = target.dataset.modId;
  if (!modId) return;
  const moduleEl = document.querySelector(`.module[data-id="${modId}"]`);
  if (!moduleEl) return;
  if (target.classList.contains('up')) { const prev = moduleEl.previousElementSibling; if (prev && prev.classList.contains('module')) moduleEl.parentNode.insertBefore(moduleEl, prev); }
  if (target.classList.contains('down')) { const next = moduleEl.nextElementSibling; if (next && next.classList.contains('module')) moduleEl.parentNode.insertBefore(next, moduleEl); }
  if (target.classList.contains('del')) { if (confirm('确定删除该模块？')) moduleEl.remove(); }
  refreshSidebarModuleList();
  renderPreview();
}

function initDragSort() {
  const list = document.getElementById('moduleList');
  const modulesContainer = document.getElementById('modules-container');
  const dragItems = list.querySelectorAll('.module-item');
  dragItems.forEach(item => {
    item.draggable = true;
    item.ondragstart = (e) => { e.dataTransfer.setData('text/plain', item.dataset.modId); item.style.opacity = '0.5'; };
    item.ondragend = () => { item.style.opacity = '1'; };
  });
  list.ondragover = (e) => e.preventDefault();
  list.ondrop = (e) => {
    e.preventDefault();
    const modId = e.dataTransfer.getData('text/plain');
    const targetItem = e.target.closest('.module-item');
    if (!targetItem || targetItem.dataset.modId === modId) return;
    const sourceModule = document.querySelector(`.module[data-id="${modId}"]`);
    const targetModule = document.querySelector(`.module[data-id="${targetItem.dataset.modId}"]`);
    if (!sourceModule || !targetModule) return;
    const sourceNext = sourceModule.nextElementSibling;
    const targetNext = targetModule.nextElementSibling;
    if (sourceNext === targetModule) modulesContainer.insertBefore(targetModule, sourceModule);
    else if (targetNext === sourceModule) modulesContainer.insertBefore(sourceModule, targetModule);
    else modulesContainer.insertBefore(sourceModule, targetNext);
    refreshSidebarModuleList();
    renderPreview();
  };
}

// ===== 模板本地存储系统 =====
const TPL_KEY = "product_description_templates";
function getAllTemplates() { try { let data = localStorage.getItem(TPL_KEY); return data ? JSON.parse(data) : {}; } catch (error) { return {}; } }
function saveTemplate(name, data) { try { let tpls = getAllTemplates(); tpls[name] = data; localStorage.setItem(TPL_KEY, JSON.stringify(tpls)); refreshTemplateList(); } catch (error) { alert('保存模板失败：' + error.message); } }
function deleteTemplate(name) { try { let tpls = getAllTemplates(); delete tpls[name]; localStorage.setItem(TPL_KEY, JSON.stringify(tpls)); refreshTemplateList(); } catch (error) { alert('删除模板失败：' + error.message); } }
function refreshTemplateList() { try { let tpls = getAllTemplates(); let sel = document.getElementById("templateList"); sel.innerHTML = `<option value="">—— 选择加载模板 ——</option>`; for (let name in tpls) sel.innerHTML += `<option value="${name}">${name}</option>`; } catch (error) {} }
function exportAllTemplates() { try { const allTemplates = getAllTemplates(); if (Object.keys(allTemplates).length === 0) { alert("暂无模板可导出！"); return; } const jsonStr = JSON.stringify(allTemplates, null, 2); const blob = new Blob([jsonStr], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = `商品描述模板_${new Date().toISOString().slice(0, 10)}.json`; a.click(); URL.revokeObjectURL(url); alert("模板已导出！"); } catch (error) { alert('导出模板失败：' + error.message); } }
function importTemplates(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const importedTemplates = JSON.parse(e.target.result);
      if (typeof importedTemplates !== "object" || importedTemplates === null) throw new Error("文件格式错误");
      for (const tplName in importedTemplates) { if (!Array.isArray(importedTemplates[tplName])) throw new Error(`模板 "${tplName}" 格式不正确`); }
      const existingTemplates = getAllTemplates();
      localStorage.setItem(TPL_KEY, JSON.stringify({ ...existingTemplates, ...importedTemplates }));
      refreshTemplateList();
      alert(`模板导入成功！共导入 ${Object.keys(importedTemplates).length} 个模板`);
    } catch (err) { alert("导入失败：" + err.message); }
  };
  reader.readAsText(file);
}

// 视频链接解析
function parseVideoUrl(type, input) {
  if (!input) return '';
  if (type === 'youtube') { const match = input.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/)|y2u\.be\/)([a-zA-Z0-9_-]{11})/); return `https://www.youtube.com/embed/${match ? match[1] : input.trim()}?rel=0`; }
  if (type === 'bilibili') { const match = input.match(/BV[a-zA-Z0-9]{10}/); return `https://player.bilibili.com/player.html?bvid=${match ? match[0] : input.trim()}&page=1&autoplay=0`; }
  return input.trim();
}

// 序列化模块数据
function serializeCurrentModules() {
  try {
    let mods = [];
    document.querySelectorAll(".module").forEach(m => {
      let type = m.dataset.type;
      let obj = { type, hidden: m.classList.contains("hidden") };
      obj.moduleTitle = m.querySelector(".module-title")?.value || "";
      obj.titleSize = m.querySelector(".title-size")?.value || "14px";
      
      if (type === "title") { obj.text = m.querySelector(".title-text").value; obj.level = m.querySelector(".title-level").value; }
      if (type === "text") { obj.content = m.querySelector(".text-content").value; obj.size = m.querySelector(".text-size").value; }
      if (type === "image") { obj.url = m.querySelector(".img-url")?.value || ""; obj.link = m.querySelector(".img-link")?.value || ""; obj.desc = m.querySelector(".img-desc")?.value || ""; }
      if (type === "table") {
        obj.rows = [];
        m.querySelectorAll(".table-row-item").forEach(tr => {
          let row = [];
          tr.querySelectorAll(".table-cell").forEach(cell => { row.push({ ctype: cell.querySelector(".ctype").value, content: cell.querySelector(".content").value, link: cell.querySelector(".link")?.value || "" }); });
          obj.rows.push(row);
        });
      }
      if (type === "video") { obj.videoType = m.querySelector(".video-type")?.value || "youtube"; obj.videoUrl = m.querySelector(".video-url")?.value || ""; obj.videoDesc = m.querySelector(".video-desc")?.value || ""; }
      if (type === "download") { obj.fileType = m.querySelector(".file-type")?.value || "pdf"; obj.fileName = m.querySelector(".file-name")?.value || ""; obj.downloadUrl = m.querySelector(".download-url")?.value || ""; obj.fileDesc = m.querySelector(".file-desc")?.value || ""; obj.btnText = m.querySelector(".btn-text")?.value || "立即下载"; }
      if (type === "alert") { obj.alertTitle = m.querySelector(".alert-title-text")?.value || "重要提醒"; obj.alertTitleSize = m.querySelector(".alert-title-size")?.value || "14px"; obj.alertStyle = m.querySelector(".alert-style")?.value || "error"; obj.alertContent = m.querySelector(".alert-content")?.value || ""; }
      if (type === "selling") {
        obj.points = [];
        m.querySelectorAll(".point-item").forEach(item => { obj.points.push({ iconText: item.querySelector(".point-icon-text")?.value || "", iconUrl: item.querySelector(".point-icon-url")?.value || "", text: item.querySelector(".point-text")?.value || "", link: item.querySelector(".point-link")?.value || "" }); });
      }
      if (type === "collapse") {
        obj.collapses = [];
        m.querySelectorAll(".collapse-item-edit").forEach(item => { obj.collapses.push({ title: item.querySelector(".collapse-title")?.value || "", content: item.querySelector(".collapse-content")?.value || "" }); });
      }
      
      // 新增序列化逻辑
      if (type === "format") {
        obj.formatType = m.querySelector(".format-type")?.value || "divider";
        obj.dividerStyle = m.querySelector(".divider-style")?.value || "solid";
        obj.dividerHeight = m.querySelector(".divider-height")?.value || "2";
        obj.spacerHeight = m.querySelector(".spacer-height")?.value || "20";
        obj.listContent = m.querySelector(".list-content")?.value || "";
        obj.listStyle = m.querySelector(".list-style")?.value || "disc";
        obj.centerContent = m.querySelector(".center-content")?.value || "";
        obj.formatColor = m.querySelector(".format-color")?.value || "#e5e7eb";
        obj.textSize = m.querySelector(".text-size")?.value || "14px";
      }
      if (type === "customcode") {
        obj.customCode = m.querySelector(".custom-code-input")?.value || "";
        obj.codePreview = m.querySelector(".code-preview-toggle")?.checked || false;
      }
      mods.push(obj);
    });
    return mods;
  } catch (error) { console.error('序列化模块失败:', error); return []; }
}

// 加载模板数据
function loadTemplateData(data) {
  try {
    let container = document.getElementById("modules-container");
    container.innerHTML = '';
    data.forEach(mod => {
      let el;
      if (mod.type === "title") el = createTitleModule(mod);
      if (mod.type === "text") el = createTextModule(mod);
      if (mod.type === "image") el = createImageModule(mod);
      if (mod.type === "table") el = createTableModule(mod);
      if (mod.type === "video") el = createVideoModule(mod);
      if (mod.type === "download") el = createDownloadModule(mod);
      if (mod.type === "alert") el = createAlertModule(mod);
      if (mod.type === "selling") el = createSellingModule(mod);
      if (mod.type === "collapse") el = createCollapseModule(mod);
      if (mod.type === "format") el = createFormatModule(mod); // 新增
      if (mod.type === "customcode") el = createCustomCodeModule(mod); // 新增
      if (mod.hidden) el.classList.add("hidden");
      container.appendChild(el);
    });
    refreshSidebarModuleList();
    renderPreview();
  } catch (error) { alert('加载模板失败：' + error.message); }
}

// ===== 渲染 + 导出 =====
async function renderHTML() {
  try {
    let out = '';
    let mods = document.querySelectorAll(".module");
    
    for (let i = 0; i < mods.length; i++) {
      let m = mods[i];
      if (m.classList.contains("hidden")) continue;
      let t = m.dataset.type;

      const moduleTitle = m.querySelector(".module-title")?.value.trim();
      const titleSize = m.querySelector(".title-size")?.value || "14px";
      if (moduleTitle) out += `<div class="module-title-wrap" style="font-size:${titleSize}">${moduleTitle}</div>`;

      if (t === "title") {
        let tx = m.querySelector(".title-text").value;
        let l = m.querySelector(".title-level").value;
        let sz = m.querySelector(".title-size").value || "14px";
        out += `<${l} style="font-size:${sz}">${tx}</${l}>`;
      }
      
      if (t === "text") {
        let tx = m.querySelector(".text-content").value.replace(/\n/g, "<br>");
        let sz = m.querySelector(".text-size").value;
        out += `<p style="font-size:${sz}">${tx}</p>`;
      }
      
      if (t === "image") {
        let url = m.querySelector(".img-url")?.value;
        let link = m.querySelector(".img-link")?.value;
        let desc = m.querySelector(".img-desc")?.value || "";
        if (url) {
          let imgHtml = `<img src="${url}" style="max-width:100%">`;
          if (link) imgHtml = `<a href="${link}" target="_blank" style="color:inherit !important;text-decoration:none !important;border-bottom:none !important">${imgHtml}</a>`;
          out += `<div style="text-align:center">${imgHtml}<p>${desc}</p></div>`;
        }
      }
      
      if (t === "table") {
        out += `<table border="1" width="100%" cellpadding="8" style="border-collapse:collapse">`;
        let trs = m.querySelectorAll(".table-row-item");
        let max = 0;
        trs.forEach(tr => { let c = tr.querySelectorAll(".table-cell").length; if (c > max) max = c; });
        for (let j = 0; j < trs.length; j++) {
          let tr = trs[j];
          out += "<tr>";
          let cells = tr.querySelectorAll(".table-cell");
          for (let k = 0; k < cells.length; k++) {
            let cell = cells[k];
            let cty = cell.querySelector(".ctype").value;
            let con = cell.querySelector(".content").value;
            let link = cell.querySelector(".link").value;
            let cp = 1;
            if (k === cells.length - 1 && cells.length < max) cp = max - cells.length + 1;
            let h = '';
            if (cty === "img") { h = `<img src="${con}" style="max-height:60px">`; if (link) h = `<a href="${link}" target="_blank" style="color:inherit !important;text-decoration:none !important;border-bottom:none !important">${h}</a>`; }
            else { h = link ? `<a href="${link}" target="_blank" style="color:inherit !important;text-decoration:none !important;border-bottom:none !important">${con}</a>` : con || ""; }
            out += `<td colspan="${cp}">${h}</td>`;
          }
          out += "</tr>";
        }
        out += "</table>";
      }

      // 视频模块渲染
      if (t === "video") {
        const videoType = m.querySelector(".video-type")?.value || "youtube";
        const videoInput = m.querySelector(".video-url")?.value || "";
        const videoDesc = m.querySelector(".video-desc")?.value || "";
        const videoUrl = parseVideoUrl(videoType, videoInput);
        const videoId = `video_${Date.now()}_${i}`;
        if (videoUrl) {
          out += `<div class="video-container" id="${videoId}">`;
          if (videoType === "direct") out += `<video controls><source src="${videoUrl}" type="video/mp4"><div class="video-fallback active"><div class="video-fallback-icon">📹</div><p>您的浏览器不支持HTML5视频播放</p><a href="${videoUrl}" class="video-fallback-link" target="_blank" style="color:#fff !important;text-decoration:none !important;border-bottom:none !important">点击下载视频</a></div></video>`;
          else out += `<iframe src="${videoUrl}" allowfullscreen></iframe><div class="video-fallback" id="fallback_${videoId}"><div class="video-fallback-icon">📺</div><p>视频加载失败，请点击下方链接查看</p><a href="${videoInput}" class="video-fallback-link" target="_blank" style="color:#fff !important;text-decoration:none !important;border-bottom:none !important">点击查看视频</a></div>`;
          out += `</div>`;
          if (videoDesc) out += `<p style="text-align:center;margin-top:8px;color:#666">${videoDesc}</p>`;
        }
      }

      // 下载模块渲染
      if (t === "download") {
        const fileType = m.querySelector(".file-type")?.value || "pdf";
        const fileName = m.querySelector(".file-name")?.value || "";
        const downloadUrl = m.querySelector(".download-url")?.value || "";
        const fileDesc = m.querySelector(".file-desc")?.value || "";
        const btnText = m.querySelector(".btn-text")?.value || "立即下载";
        const fileIconUrlMap = { pdf: 'https://cdn.shopify.com/s/files/1/0713/8685/7632/files/pdf.svg', doc: 'https://cdn.shopify.com/s/files/1/0713/8685/7632/files/Word.svg', xls: 'https://cdn.shopify.com/s/files/1/0713/8685/7632/files/pdf.svg', ppt: 'https://cdn.shopify.com/s/files/1/0713/8685/7632/files/PPT.svg', zip: 'https://cdn.shopify.com/s/files/1/0713/8685/7632/files/zip.svg', txt: 'https://cdn.shopify.com/s/files/1/0713/8685/7632/files/txt.svg' };
        const iconUrl = fileIconUrlMap[fileType] || fileIconUrlMap['pdf'];
        out += `<div class="download-card"><div class="download-icon icon-${fileType}"><img src="${iconUrl}" alt="${fileType}图标"></div><div class="download-info"><div class="download-title">${fileName}</div>${fileDesc ? `<div class="download-desc">${fileDesc}</div>` : ""}</div>${downloadUrl ? `<a href="${downloadUrl}" target="_blank" class="download-btn">${btnText}</a>` : ""}</div>`;
      }

      // 高亮提示框渲染（新增3种样式）
      if (t === "alert") {
        const alertTitle = m.querySelector(".alert-title-text")?.value || "重要提醒";
        const alertTitleSize = m.querySelector(".alert-title-size")?.value || "14px";
        const alertStyle = m.querySelector(".alert-style")?.value || "error";
        const alertContent = m.querySelector(".alert-content")?.value.replace(/\n/g, "<br>") || "";
        const iconMap = { 
          warning: '⚠️', 
          success: '✅', 
          error: '❌', 
          info: 'ℹ️',
          purple: '🔮',
          orange: '🍊',
          black: '🖤'
        };
        out += `<div class="alert-box alert-${alertStyle}"><div class="alert-title" style="font-size: ${alertTitleSize};"><span class="alert-icon">${iconMap[alertStyle] || '⚠️'}</span>${alertTitle}</div><div class="alert-content">${alertContent}</div></div>`;
      }

      // 卖点卡片渲染
      if (t === "selling") {
        out += `<div class="selling-points">`;
        m.querySelectorAll(".point-item").forEach(item => {
          const iconText = item.querySelector(".point-icon-text")?.value || "";
          const iconUrl = item.querySelector(".point-icon-url")?.value || "";
          const pointText = item.querySelector(".point-text")?.value || "";
          const pointLink = item.querySelector(".point-link")?.value || "";
          let iconHtml = iconUrl ? `<img src="${iconUrl}" alt="图标">` : (iconText || '');
          let cardContent = `<div class="point-icon">${iconHtml}</div><div class="point-text">${pointText}</div>`;
          if (pointLink) cardContent = `<a href="${pointLink}" target="_blank" style="text-decoration:none;color:inherit">${cardContent}</a>`;
          out += `<div class="point-card">${cardContent}</div>`;
        });
        out += `</div>`;
      }

      // 折叠面板渲染
      if (t === "collapse") {
        out += `<div class="collapse-panel">`;
        m.querySelectorAll(".collapse-item-edit").forEach((item, index) => {
          const collapseTitle = item.querySelector(".collapse-title")?.value || "";
          const collapseContent = item.querySelector(".collapse-content")?.value.replace(/\n/g, "<br>") || "";
          const collapseId = `collapse_${Date.now()}_${index}`;
          out += `<div class="collapse-item"><div class="collapse-header" onclick="toggleCollapse('${collapseId}')">${collapseTitle}</div><div id="${collapseId}" class="collapse-content">${collapseContent}</div></div>`;
        });
        out += `</div>`;
      }

      // 排版模块渲染
      if (t === "format") {
        const fType = m.querySelector(".format-type")?.value || "divider";
        let fHtml = "";
        if (fType === "divider") {
          const style = m.querySelector(".divider-style")?.value || "solid";
          const h = m.querySelector(".divider-height")?.value || "2";
          const c = m.querySelector(".format-color")?.value || "#e5e7eb";
          if (style === "gradient") fHtml = `<div style="height:${h}px;background:linear-gradient(90deg,transparent,${c},transparent);margin:16px 0"></div>`;
          else if (style === "double") fHtml = `<div style="border-top:${h}px double ${c};border-bottom:${h}px double ${c};margin:16px 0"></div>`;
          else fHtml = `<hr style="border:none;border-top:${h}px ${style} ${c};margin:16px 0">`;
        } else if (fType === "spacer") {
          const sh = m.querySelector(".spacer-height")?.value || "20";
          fHtml = `<div style="height:${sh}px"></div>`;
        } else if (fType === "list") {
          const content = m.querySelector(".list-content")?.value || "";
          const items = content.split('\n').filter(l=>l.trim()).map(l=>`<li style="margin-bottom:6px;font-size:14px">${l.trim()}</li>`).join('');
          const listStyle = m.querySelector(".list-style")?.value || "disc";
          fHtml = `<ul style="list-style-type:${listStyle};padding-left:20px;margin:12px 0;color:#333">${items}</ul>`;
        } else if (fType === "center") {
          const txt = (m.querySelector(".center-content")?.value || "").replace(/\n/g, "<br>");
          const color = m.querySelector(".format-color")?.value || "#3161e7";
          fHtml = `<div style="text-align:center;font-size:16px;color:${color};margin:16px 0;font-weight:500">${txt}</div>`;
        }
        out += fHtml;
      }

      // 自由代码模块渲染
      if (t === "customcode") {
        const code = m.querySelector(".custom-code-input")?.value || "";
        if (code) out += code;
      }
    }
    
    const styleCss = `<style>img{max-width:100%}table{width:100%;border-collapse:collapse}.video-fallback-link, .download-btn { color: inherit !important; text-decoration: none !important; border-bottom: none !important; outline: none !important; box-shadow: none !important; }.module-title-wrap{margin:8px 0;font-weight:bold}.video-container { position: relative; width: 100%; padding-bottom: 56.25%; margin: 10px 0; background: #f5f5f5; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }.video-container iframe, .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }.video-fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; background: #f8f8f8; color: #666; padding: 20px; text-align: center; }.video-fallback.active { display: flex; }.video-fallback-icon { font-size: 48px; margin-bottom: 16px; color: #999; }.video-fallback-link { margin-top: 12px; padding: 8px 16px; background: #3161e7; color: #fff !important; border-radius: 6px; text-decoration: none !important; border-bottom: none !important; }.download-card { display: flex !important; align-items: center !important; gap: 12px !important; background: #f8f9fa !important; border-radius: 10px !important; padding: 16px 20px !important; margin: 10px 0 !important; border: 1px solid #e9ecef !important; transition: all 0.2s ease !important; width: 100% !important; box-sizing: border-box !important; text-decoration: none !important; border-bottom: none !important; box-shadow: none !important; color: inherit !important; cursor: default !important; }.download-card:hover { background: #f0f7ff !important; border-color: #3161e7 !important; transform: translateY(-2px) !important; box-shadow: 0 4px 12px rgba(49, 97, 231, 0.1) !important; }.download-icon { width: 48px !important; height: 48px !important; border-radius: 8px !important; display: flex !important; align-items: center !important; justify-content: center !important; font-size: 24px !important; color: #fff !important; flex-shrink: 0 !important; }.download-icon img { width: 24px !important; height: 24px !important; object-fit: contain !important; filter: brightness(0) invert(1) !important; }.icon-pdf { background: #e74c3c !important; }.icon-doc { background: #3498db !important; }.icon-xls { background: #2ecc71 !important; }.icon-ppt { background: #f39c12 !important; }.icon-zip { background: #9b59b6 !important; }.icon-txt { background: #34495e !important; }.download-info { flex: 1 !important; }.download-title { font-size: 16px !important; font-weight: 600 !important; color: #2d3748 !important; margin-bottom: 4px !important; }.download-desc { font-size: 14px !important; color: #718096 !important; }.download-btn { padding: 8px 16px !important; background: #3161e7 !important; color: #fff !important; border: none !important; border-radius: 6px !important; font-size: 14px !important; cursor: pointer !important; white-space: nowrap !important; flex-shrink: 0 !important; text-decoration: none !important; border-bottom: none !important; display: inline-block !important; }.download-btn:hover { background: #254fcb !important; }.alert-box { border-radius: 4px; padding: 12px 16px; position: relative; margin-bottom: 16px; font-size: 14px; line-height: 1.5; }.alert-warning { background-color: #fffbe6; border-left: 4px solid #faad14; }.alert-success { background-color: #f0fff4; border-left: 4px solid #52c41a; }.alert-error { background-color: #fff2f0; border-left: 4px solid #f5222d; border-radius: 8px 0 0 8px; }.alert-info { background-color: #e6f7ff; border-left: 4px solid #1890ff; }.alert-purple { background-color: #f5f3ff; border-left: 4px solid #8b5cf6; }.alert-purple .alert-title { color: #7c3aed; }.alert-orange { background-color: #fff7ed; border-left: 4px solid #f97316; }.alert-orange .alert-title { color: #ea580c; }.alert-black { background-color: #f3f4f6; border-left: 4px solid #111111; }.alert-black .alert-title { color: #111111; }.alert-black .alert-content { color: #374151; }.alert-title { font-weight: bold; margin-bottom: 6px; display: flex; align-items: center; font-size: 14px; }.alert-error .alert-title { color: #f5222d; }.alert-warning .alert-title { color: #faad14; }.alert-success .alert-title { color: #52c41a; }.alert-info .alert-title { color: #1890ff; }.alert-icon { margin-right: 8px; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; line-height: 1; }.alert-content { color: #333; font-size: 14px; line-height: 1.5; }.selling-points { display: flex; flex-wrap: wrap; gap: 12px; margin: 10px 0; }.point-card { flex: 1; min-width: 200px; padding: 16px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }.point-card:hover { background: #f0f7ff; border-color: #3161e7; transform: translateY(-2px); }.point-icon { font-size: 24px; flex-shrink: 0; }.point-icon img { width: 24px; height: 24px; object-fit: contain; }.point-text { font-size: 14px; color: #333; font-weight: 500; }.collapse-panel { border: 1px solid #e5e7eb; border-radius: 8px; margin: 10px 0; overflow: hidden; }.collapse-item { border-bottom: 1px solid #e5e7eb; }.collapse-item:last-child { border-bottom: none; }.collapse-header { padding: 12px 16px; background: #f9fafb; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; font-size: 14px; }.collapse-header:hover { background: #f3f4f6; }.collapse-header::after { content: "▼"; font-size: 10px; color: #666; transition: transform 0.2s; }.collapse-header.active::after { transform: rotate(180deg); }.collapse-content { padding: 16px; font-size: 14px; line-height: 1.6; color: #4b5563; display: block; }@media(max-width:768px) {.download-card { flex-direction: column !important; text-align: center !important; }.download-info { width: 100% !important; }.selling-points { flex-direction: column; }.point-card { min-width: 100%; }}</style>`;
    return styleCss + out;
  } catch (error) {
    console.error('渲染HTML失败:', error);
    return `<p style="color:red">渲染失败：${error.message}</p>`;
  }
}

function toggleCollapse(id) {
  try {
    const content = document.getElementById(id);
    const header = content.previousElementSibling;
    if (content.style.display === 'none') { content.style.display = 'block'; header.classList.add('active'); }
    else { content.style.display = 'none'; header.classList.remove('active'); }
  } catch (error) { console.error('切换折叠面板失败:', error); }
}

function checkVideoLoadStatus() {
  try {
    const iframes = document.querySelectorAll('#preview-html .video-container iframe');
    iframes.forEach(iframe => {
      const fallback = iframe.nextElementSibling;
      if (!fallback || !fallback.classList.contains('video-fallback')) return;
      setTimeout(() => { try { if (iframe.contentWindow?.location?.href === 'about:blank') { fallback.classList.add('active'); iframe.style.display = 'none'; } } catch (e) {} }, 5000);
      iframe.onerror = function() { fallback.classList.add('active'); iframe.style.display = 'none'; };
    });
  } catch (error) { console.error('检测视频加载状态失败:', error); }
}

function renderPreview() { 
  try {
    renderHTML().then(h => {
      const previewEl = document.getElementById("preview-html");
      previewEl.innerHTML = h;
      checkVideoLoadStatus();
      document.querySelectorAll('.collapse-content').forEach(content => { content.style.display = 'block'; content.previousElementSibling.classList.add('active'); });
      
      document.querySelectorAll('.module[data-type="customcode"]').forEach((mod, idx) => {
        const toggle = mod.querySelector('.code-preview-toggle');
        const previewBox = mod.querySelector('.customcode-preview');
        const codeInput = mod.querySelector('.custom-code-input');
        if (!toggle || !previewBox || !codeInput) return;
        const show = toggle.checked;
        previewBox.style.display = show ? 'block' : 'none';
        if (show) {
          let safeCode = codeInput.value.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '<!-- JS已隐藏，导出时将完整保留 -->');
          previewBox.innerHTML = safeCode || '<span style="color:#999">暂无代码</span>';
        } else { previewBox.innerHTML = '预览区'; }
      });
    }).catch(err => {
      console.error("渲染预览出错：", err);
      document.getElementById("preview-html").innerHTML = `<p style='color:red'>预览渲染出错：${err.message}</p>`;
    });
  } catch (err) {
    console.error("预览函数执行出错：", err);
    document.getElementById("preview-html").innerHTML = `<p style='color:red'>预览函数执行出错：${err.message}</p>`;
  }
}

function copy(which) {
  try {
    let ta = document.getElementById("code-" + which);
    if (navigator.clipboard) { navigator.clipboard.writeText(ta.value).then(() => alert("已复制到剪贴板")).catch(() => { ta.select(); document.execCommand("copy"); alert("已复制"); }); }
    else { ta.select(); document.execCommand("copy"); alert("已复制"); }
  } catch (error) { alert('复制失败：' + error.message); }
}

function clearAllModules() { if (!confirm('确定要清空所有模块吗？此操作不可恢复！')) return; document.getElementById('modules-container').innerHTML = ''; refreshSidebarModuleList(); renderPreview(); alert('已清空所有模块！'); }
function copyCurrentConfig() { const data = serializeCurrentModules(); const jsonStr = JSON.stringify(data, null, 2); navigator.clipboard.writeText(jsonStr).then(() => alert('✅ 已复制全部配置！可直接粘贴复用')).catch(err => alert('复制失败：' + err.message)); }
async function pasteConfig() { try { const text = await navigator.clipboard.readText(); const data = JSON.parse(text); if (!Array.isArray(data)) { alert('粘贴内容不是有效的配置数据！'); return; } loadTemplateData(data); alert('✅ 配置粘贴成功！'); } catch (err) { alert('粘贴失败：' + err.message); } }

function initEvents() {
  try {
    document.getElementById('sidebarToggle').addEventListener('click', toggleSidebar);
    document.getElementById('moduleList').addEventListener('click', handleSidebarModuleAction);
    document.addEventListener('input', function(e) {
      if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) {
        clearTimeout(renderTimer);
        renderTimer = setTimeout(() => { refreshSidebarModuleList(); renderPreview(); }, 300);
      }
      if (e.target.classList.contains('code-preview-toggle')) { clearTimeout(renderTimer); renderTimer = setTimeout(() => renderPreview(), 200); }
    });
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('top')) { const mod = e.target.closest('.module'); document.getElementById('modules-container').prepend(mod); refreshSidebarModuleList(); renderPreview(); return; }
      if (e.target.classList.contains('copy-mod')) { const mod = e.target.closest('.module'); const clone = mod.cloneNode(true); clone.dataset.id = 'mod_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); clone.classList.remove('collapsed'); mod.after(clone); refreshSidebarModuleList(); renderPreview(); return; }
      if (e.target.classList.contains('collapse-editor')) { const mod = e.target.closest('.module'); mod.classList.toggle('collapsed'); refreshSidebarModuleList(); return; }
      if (e.target.classList.contains('add-module-btn')) { const type = e.target.dataset.type; const html = moduleTemplates[type](); document.getElementById('modules-container').insertAdjacentHTML('beforeend', html); refreshSidebarModuleList(); renderPreview(); return; }
      if (e.target.classList.contains('up')) { const mod = e.target.closest('.module'); const prev = mod.previousElementSibling; if (prev && prev.classList.contains('module')) mod.parentNode.insertBefore(mod, prev); refreshSidebarModuleList(); renderPreview(); return; }
      if (e.target.classList.contains('down')) { const mod = e.target.closest('.module'); const next = mod.nextElementSibling; if (next && next.classList.contains('module')) mod.parentNode.insertBefore(next, mod); refreshSidebarModuleList(); renderPreview(); return; }
      if (e.target.classList.contains('del')) { const mod = e.target.closest('.module'); if (confirm('删除该模块？')) mod.remove(); refreshSidebarModuleList(); renderPreview(); return; }
      if (e.target.classList.contains('hide')) { const mod = e.target.closest('.module'); mod.classList.toggle('hidden'); refreshSidebarModuleList(); renderPreview(); return; }
      if (e.target.classList.contains('add-col')) { const rowItem = e.target.closest('.table-row-item'); const row = rowItem.querySelector('.table-row'); const cell = row.children[0]?.cloneNode(true); if (cell) { cell.querySelectorAll('input').forEach(i => i.value = ''); row.appendChild(cell); } renderPreview(); return; }
      if (e.target.classList.contains('del-col')) { const rowItem = e.target.closest('.table-row-item'); const row = rowItem.querySelector('.table-row'); if (row.children.length > 1) row.removeChild(row.lastChild); renderPreview(); return; }
      if (e.target.classList.contains('del-row')) { const item = e.target.closest('.table-row-item'); const parent = item.parentElement; if (parent.children.length > 1) item.remove(); else alert('至少保留一行'); renderPreview(); return; }
      if (e.target.classList.contains('add-new-row')) { const module = e.target.closest('.module'); const box = module.querySelector('.table-container'); const first = box.querySelector('.table-row-item'); const clone = first.cloneNode(true); clone.querySelectorAll('.content').forEach(i => i.value = ''); clone.querySelectorAll('.link').forEach(i => i.value = ''); box.appendChild(clone); renderPreview(); return; }
      if (e.target.classList.contains('add-new-point')) { const module = e.target.closest('.module'); const container = module.querySelector('.points-container'); const lastItem = container.querySelector('.point-item:last-child'); const clone = lastItem.cloneNode(true); clone.querySelectorAll('input').forEach(input => { input.value = input.classList.contains('point-icon-text') ? '✅' : ''; }); lastItem.insertAdjacentHTML('afterend', '<hr style="margin:10px 0;border:none;border-top:1px solid #eee">'); container.appendChild(clone); renderPreview(); return; }
      if (e.target.classList.contains('del-point-btn')) { const pointItem = e.target.closest('.point-item'); const container = pointItem.parentElement; if (container.querySelectorAll('.point-item').length <= 1) { alert('至少保留一个卖点卡片'); return; } const prevHr = pointItem.previousElementSibling; if (prevHr && prevHr.tagName === 'HR') prevHr.remove(); pointItem.remove(); renderPreview(); return; }
      if (e.target.classList.contains('add-new-collapse')) { const module = e.target.closest('.module'); const container = module.querySelector('.collapse-container'); const lastItem = container.querySelector('.collapse-item-edit:last-child'); const clone = lastItem.cloneNode(true); clone.querySelector('.collapse-title').value = '新折叠项'; clone.querySelector('.collapse-content').value = '折叠内容'; lastItem.insertAdjacentHTML('afterend', '<hr style="margin:10px 0;border:none;border-top:1px solid #eee">'); container.appendChild(clone); renderPreview(); return; }
      if (e.target.classList.contains('del-collapse-btn')) { const collapseItem = e.target.closest('.collapse-item-edit'); const container = collapseItem.parentElement; if (container.querySelectorAll('.collapse-item-edit').length <= 1) { alert('至少保留一个折叠项'); return; } const prevHr = collapseItem.previousElementSibling; if (prevHr && prevHr.tagName === 'HR') prevHr.remove(); collapseItem.remove(); renderPreview(); return; }
      if (e.target.id === 'saveTemplate') { let name = document.getElementById("tplName").value.trim(); if (!name) return alert("请输入模板名称"); let data = serializeCurrentModules(); saveTemplate(name, data); alert("保存成功"); document.getElementById("tplName").value = ''; return; }
      if (e.target.id === 'loadTemplate') { let name = document.getElementById("templateList").value; if (!name) return alert("请选择模板"); let tpls = getAllTemplates(); loadTemplateData(tpls[name]); alert("模板加载成功"); return; }
      if (e.target.id === 'delTemplate') { let name = document.getElementById("templateList").value; if (!name) return alert("请选择要删除的模板"); if (confirm("确定删除该模板？删除后无法恢复")) { deleteTemplate(name); alert("模板已删除"); } return; }
      if (e.target.id === 'exportTemplateBtn') { exportAllTemplates(); return; }
      if (e.target.id === 'importTemplateBtn') { document.getElementById('templateFileInput').click(); return; }
      if(e.target.id === 'clearAll'){ clearAllModules(); return; }
      if(e.target.id === 'copyConfig'){ copyCurrentConfig(); return; }
      if(e.target.id === 'pasteConfig'){ pasteConfig(); return; }
    });
    document.getElementById('templateFileInput').addEventListener('change', function(e) { const file = e.target.files[0]; if (file) { importTemplates(file); e.target.value = ''; } });
    document.getElementById('refresh').addEventListener('click', function() { refreshSidebarModuleList(); renderPreview(); });
    document.getElementById('export').addEventListener('click', function() { document.getElementById("modal").style.display = "flex"; document.getElementById("code-cn").value = "生成中..."; renderHTML().then(cn => { document.getElementById("code-cn").value = cn; }).catch(err => { document.getElementById("code-cn").value = "生成失败：" + err.message; }); });
    document.getElementById('closeModal').addEventListener('click', function() { document.getElementById("modal").style.display = "none"; });
  } catch (error) { console.error('初始化事件失败:', error); alert('初始化事件失败：' + error.message); }
}

window.onload = function() {
  try { refreshTemplateList(); initEvents(); refreshSidebarModuleList(); renderPreview(); } catch (err) { console.error("页面初始化出错：", err); alert("初始化出错：" + err.message); }
};
</script>
